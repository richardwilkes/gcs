name: Build

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Same target set the Unison packager (upack) supports. Everything is built natively per platform/arch because
        # both Unison (Skia/GL) and the MuPDF-backed pdf dependency are cgo with per-arch static libraries, so
        # cross-compilation isn't practical.
        os: [ubuntu-22.04, ubuntu-22.04-arm, macos-26-intel, macos-26, windows-2022, windows-11-arm]
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libx11-dev \
            libgl1-mesa-dev \
            libfontconfig1-dev \
            libfreetype-dev

      - name: Install Windows ARM64 toolchain
        if: runner.os == 'Windows' && runner.arch == 'ARM64'
        env:
          LLVM_MINGW_VERSION: "20260616"
        run: |
          # The default mingw gcc on the Windows/ARM64 runner is an x86_64 build that emits x86 code and can't link the
          # native arm64 static libraries, so install a native aarch64 llvm-mingw toolchain instead.
          name="llvm-mingw-${LLVM_MINGW_VERSION}-ucrt-aarch64"
          curl -fsSL -o "$RUNNER_TEMP/$name.zip" \
            "https://github.com/mstorsjo/llvm-mingw/releases/download/${LLVM_MINGW_VERSION}/$name.zip"
          7z x "$RUNNER_TEMP/$name.zip" -o"$RUNNER_TEMP" >/dev/null
          echo "$RUNNER_TEMP/$name/bin" >> "$GITHUB_PATH"
          echo "CC=aarch64-w64-mingw32-gcc" >> "$GITHUB_ENV"

      - name: Build
        run: |
          # The race detector isn't supported on windows/arm64, so build & test without it there.
          if [ "$RUNNER_OS" = "Windows" ] && [ "$RUNNER_ARCH" = "ARM64" ]; then
            ./build.sh --go --test
          else
            ./build.sh --go --race
          fi

      # Lint via the official action rather than build.sh's --lint step: the latter downloads golangci-lint through its
      # upstream install.sh, whose checksum verification fails for unauthenticated release downloads in CI.
      - name: Lint
        uses: golangci/golangci-lint-action@v9
        env:
          GOEXPERIMENT: jsonv2,nodwarf5
        with:
          version: latest

      - name: Stage artifact
        id: stage
        run: |
          goos=$(go env GOOS)
          goarch=$(go env GOARCH)
          platform=$goos
          [ "$goos" = "darwin" ] && platform=macos
          bin=gcs
          [ "$goos" = "windows" ] && bin=gcs.exe
          mkdir -p dist
          mv "$bin" "dist/$bin"
          echo "artifact_name=gcs-$platform-$goarch" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.stage.outputs.artifact_name }}
          path: dist/
          if-no-files-found: error
